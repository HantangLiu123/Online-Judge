services:
  ojdb:
    image: postgres:latest
    ports:
      - 5432:5432
    volumes:
      - oj-postgresql-data:/var/lib/postgresql
    environment:
      POSTGRES_DB: oj_app
      POSTGRES_USER: oj_user
      POSTGRES_PASSWORD: oj_password
      POSTGRES_PORT: 5432
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U oj_user -d oj_app" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    ports:
      - 6379:6379
    volumes:
      - oj-redis-data:/data
    environment:
      REDIS_PORT: 6379
    networks:
      - backend

  api:
    build:
      context: ./
      target: api
    volumes:
      - ./migrations:/usr/local/app/migrations
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8000:8000
    env_file:
      - .env
    depends_on:
      ojdb:
        condition: service_healthy
      redis:
        condition: service_started
      worker:
        condition: service_started
    develop:
      watch:
        - path: ./api
          action: sync
          target: /usr/local/app/api
        - path: ./shared
          action: rebuild
        - path: ./environment.yml
          action: rebuild
    networks:
      - backend

  worker:
    build:
      context: ./
      target: worker
    pid: "host"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./migrations:/usr/local/app/migrations
      - ./dbconfig:/usr/local/app/dbconfig
      - /tmp/judge:/judge
    env_file:
      - .env
    depends_on:
      ojdb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend
    develop:
      watch:
        - path: ./worker
          action: sync
          target: /usr/local/app/worker
        - path: ./shared
          action: rebuild
        - path: ./environment.yml
          action: rebuild

networks:
  frontend:
  backend:

volumes:
  oj-postgresql-data:
  oj-redis-data:
